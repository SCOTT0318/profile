server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip 압축 (텍스트 파일만; WebP/MP4는 이미 압축됨)
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # 이미지/영상: 1년 캐시 (immutable)
    location ~* \.(?:webp|jpg|jpeg|png|gif|svg|mp4|webm|mov)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # CSS/JS/JSON: 개발 중 수정 즉시 반영
    location ~* \.(?:css|js|json)$ {
        expires 0;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # HTML: 캐시 안 함 (수정 즉시 반영)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # SPA 라우팅 없음 — 정적 매핑만
    location / {
        try_files $uri $uri/ =404;
    }

    # 보안 헤더
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
