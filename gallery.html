<!DOCTYPE HTML>

<html>
	<head>
		<title>이주호 — Gallery</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css?v=20260517-mobile7" />
		<link rel="stylesheet" href="assets/css/mobile.css?v=20260517-mobile7" />
		<link rel="stylesheet" href="assets/css/gallery.css?v=20260517-mobile7" />
	</head>
	<body class="is-preload gallery-page">

		<!-- Page Wrapper -->
			<div id="page-wrapper">
				<!-- Wrapper -->
					<div id="wrapper">
						<!-- Gallery page header -->
							<header class="gallery-header">
								<a href="index.html" class="gallery-back" aria-label="프로필로 돌아가기">
									<span class="gallery-back-arrow">←</span>
									<span class="gallery-back-label">프로필</span>
								</a>
								<div class="gallery-header-title">
									<h1 class="major">Gallery</h1>
								</div>
							</header>

						<!-- Gallery sections -->
							<section class="panel gallery-collection" id="filmography">
								<div class="gallery-toolbar">
									<!-- <p>전체 사진을 톤과 장면별로 다시 묶었습니다. 필터를 눌러 원하는 결만 볼 수 있습니다.</p> -->
									<div class="gallery-filters" data-gallery-filters></div>
								</div>
								<!-- JSON 위치: data/gallery.json -> sections -->
								<div class="gallery-sections" data-gallery></div>
							</section>

						<!-- 모달 -->
						<div id="image-modal" class="modal media-modal" aria-hidden="true">
							<button class="close-btn" type="button" aria-label="닫기">&times;</button>
							<div class="media-modal-frame">
								<button class="media-nav media-prev" type="button" aria-label="이전 영상">←</button>
								<img class="modal-content" id="modal-img" src="" alt="">
								<div class="media-player" data-media-player hidden>
									<div class="media-player-header">
										<span>Video</span>
										<strong id="modal-video-title"></strong>
										<small id="modal-video-count"></small>
									</div>
									<video class="modal-content modal-video" id="modal-video" controls controlslist="nodownload noplaybackrate" disablepictureinpicture playsinline preload="metadata" oncontextmenu="return false"></video>
								</div>
								<button class="media-nav media-next" type="button" aria-label="다음 영상">→</button>
							</div>
						</div>
					</div>
				</div>

		<!-- Scripts -->
		<script src="assets/script/gallery.js?v=20260517-mobile7"></script>
	</body>
</html>
