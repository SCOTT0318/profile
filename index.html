<!DOCTYPE HTML>

<html>
	<head>
		<!-- JSON 위치: data/profile.json -> pageTitle (스크립트 로드 후 문서 제목으로 적용) -->
		<title>배우 이주호</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css?v=20260517-mobile7" />
		<link rel="stylesheet" href="assets/css/mobile.css?v=20260517-mobile7" />
	</head>
	<body class="is-preload">

		<!-- Page Wrapper -->
			<div id="page-wrapper">
				<!-- Wrapper -->
					<div id="wrapper">
						<!-- Panel (Banner) -->
							<section class="panel banner">
								<div class="profile-card">
										<div class="sparkles" aria-hidden="true">
											<span></span><span></span><span></span><span></span><span></span><span></span>
										</div>
										<div class="info">
												<!-- JSON 위치: data/profile.json -> heroName, heroRole, heroBirthDate, heroBio -->
												<h1 class="name" data-profile="heroName"></h1>
												<p class="role" data-profile="heroRole"></p>
												<p class="meta" data-profile="heroBirthDate"></p>
											<p class="bio" data-profile="heroBio"></p>
											<h3>경력</h3>
											<!-- JSON 위치: data/profile.json -> experiences -->
											<ul class="experience" data-profile-list="experiences"></ul>
											<div class="hero-contact" id="contact">
												<h3>Contact</h3>
												<!-- JSON 위치: data/profile.json -> contact.email, contact.instagram / links.instagram -->
												<p>
													<span>Email</span>
													<a data-profile="contact.email" data-link="email"></a>
												</p>
												<p>
													<span>Instagram</span>
													<a data-profile="contact.instagram" data-link="instagram" target="_blank" rel="noopener"></a>
												</p>
											</div>
										</div>
									<div class="avatar">
										<!-- JSON 위치: data/profile.json -> heroImage -->
										<img data-profile-src="heroImage" alt="프로필 사진" />
									</div>
								</div>
							</section>
						<!-- Panel (Spot) — About -->
								<section class="panel spot large left about">
									<div class="content span-5">
										<h2 class="major">자기소개</h2>
									</div>
									<div class="about-grid">
										<div class="about-text">
											<!-- JSON 위치: data/profile.json -> about.headline, about.journey, about.quote, about.quoteSource, about.future -->
											<p class="lead" data-profile="about.headline"></p>
											<p data-profile-html="about.journey"></p>
											<blockquote class="pull-quote"><span data-profile="about.quote"></span><br /><span data-profile-html="about.quoteSource"></span></blockquote>
											<p data-profile-html="about.future"></p>
										</div>
											<!-- JSON 위치: data/profile.json -> facts -->
											<dl class="about-facts" data-profile-list="facts"></dl>
									</div>
								<div class="image filtered tinted" data-position="top right">
									<img src="images/about/about-portrait-02.webp" alt="" />
								</div>
								<div class="image filtered tinted" data-position="top right">
									<img src="images/about/about-portrait-04.webp" alt="" />
								</div>
								<div class="image filtered tinted" data-position="top right">
									<img src="images/about/about-portrait-03.webp" alt="" />
								</div>
								<div class="image filtered tinted" data-position="top right">
									<img src="images/about/about-portrait-05.webp" alt="" />
								</div>
							</section>
						<!-- Panel — Skills (특기) -->
							<section class="panel skills">
								<div class="intro">
									<h2 class="major">특기</h2>
								</div>
								<!-- JSON 위치: data/profile.json -> skills -->
								<div class="skill-groups" data-profile-list="skills"></div>
							</section>

						<!-- Panel (Spotlight) -->
						<section class="panel spotlight medium right" id="video-slider">
							<div class="video-slider">
								<!-- 비디오 슬라이드 -->
								<div class="video-slide active">
									<video src="videos/optimized/reel-01.mp4" muted playsinline preload="metadata"></video>
								</div>
								<div class="video-slide">
									<video src="videos/optimized/reel-02.mp4" muted playsinline preload="metadata"></video>
								</div>
								<div class="video-slide">
									<video src="videos/optimized/reel-03.mp4" muted playsinline preload="metadata"></video>
								</div>
							
								<!-- 좌측 버튼 -->
								<button class="prev slide-button">←</button>
								<!-- 우측 버튼 -->
								<button class="next slide-button">→</button>

								<!-- 재생 진행 바 -->
								<div class="video-progress" aria-hidden="true">
									<div class="video-progress-bar"></div>
								</div>
							</div>
						</section>

						<!-- Panel — Gallery CTA -->
						<section class="panel gallery-cta" id="gallery">
							<div class="intro">
								<h2 class="major">Gallery</h2>
								<p>다양한 작품 속 모습과 화보를 모아 두었습니다.</p>
							</div>
							<!-- JSON 위치: data/gallery.json -> sections 안의 대표 이미지 -->
							<div class="gallery-preview" data-gallery-preview></div>
							<!-- JSON 위치: data/profile.json -> links.filmography -->
							<a class="gallery-link" aria-label="갤러리 전체 보기" data-link="filmography">
								<span class="gallery-link-label">갤러리 전체 보기</span>
								<span class="gallery-link-arrow">→</span>
							</a>
						</section>

						<!-- 모달 -->
						<div id="image-modal" class="modal">
							<span class="close-btn">&times;</span>
							<img class="modal-content" id="modal-img" src="" alt="">
						</div>
					</div>
				</div>

		<!-- Scripts -->
		<script src="assets/script/index.js?v=20260517-mobile7"></script>
	</body>
</html>
